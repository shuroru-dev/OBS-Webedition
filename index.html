<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Web-OBS Pro | Shuroru Edition</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div id="obs-container">
        <div class="video-layer">
            <canvas id="mainCanvas"></canvas>
        </div>

        <div class="ui-layer">
            <div class="panel">
                <div class="header">ソース</div>
                <div id="sourceList" class="list-container"></div>
                <div class="controls">
                    <button id="addBtn" class="main-btn">+</button>
                    <div id="addMenu" class="popup-menu hidden">
                        <button onclick="addScreen()">🖥️ 画面共有</button>
                        <button onclick="addCamera()">📷 カメラ</button>
                        <button onclick="askMic()">🎤 マイクを許可する</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="header">コントロール</div>
                <div class="btn-grid">
                    <button id="openSettings">設定</button>
                    <button onclick="location.reload()">再起動</button>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal" class="modal hidden">
        <div class="modal-box">
            <div class="modal-top">
                <span>配信設定</span>
                <button id="closeSettings">×</button>
            </div>
            <div class="modal-body">
                <p>URL: webobs.pages.dev</p>
                <p>Status: HTTPS Active 🔒</p>
            </div>
        </div>
    </div>
    <script src="Javascript/script.js"></script>
</body>
</html>
