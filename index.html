<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-OBS Pro | Shuroru Edition</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div id="obs-app">
        <main class="preview-area">
            <canvas id="mainCanvas"></canvas>
        </main>

        <footer class="controls-dock">
            <div class="panel">
                <h3>ソース</h3>
                <div id="sourceList" class="list-box"></div>
                <div class="btn-group">
                    <button id="addBtn">+</button>
                    <div id="addMenu" class="hidden">
                        <button onclick="addScreen()">🖥️ 画面共有</button>
                        <button onclick="addCamera()">📷 カメラ</button>
                        <button onclick="addMic()">🎤 マイク（許可を求める）</button>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h3>コントロール</h3>
                <div class="control-grid">
                    <button id="openSettings">設定</button>
                    <button onclick="location.reload()">再起動</button>
                </div>
            </div>
        </footer>

        <div id="settingsModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <span>設定</span>
                    <button id="closeSettings">×</button>
                </div>
                <div class="modal-body">
                    <p>URL: webobs.pages.dev</p>
                </div>
            </div>
        </div>
    </div>
    <script src="Javascript/script.js"></script>
</body>
</html>
